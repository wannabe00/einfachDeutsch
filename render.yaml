# Render Blueprint for the Django backend.
# Frontend deploys separately on Vercel. DB is Neon Postgres (set DATABASE_URL
# below in the dashboard — do NOT use Render's bundled Postgres: it auto-expires).
services:
  - type: web
    name: einfachdeutsch-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      # Launch without a sending domain: users log in without email verification.
      # Change to "mandatory" once a Resend domain is verified.
      - key: ACCOUNT_EMAIL_VERIFICATION
        value: "optional"
      # Set these in the Render dashboard (sync:false = not stored in git):
      - key: ALLOWED_HOSTS # e.g. einfachdeutsch-api.onrender.com
        sync: false
      - key: DATABASE_URL # Neon pooled connection string
        sync: false
      - key: CORS_ALLOWED_ORIGINS # e.g. https://einfachdeutsch.vercel.app
        sync: false
      - key: CSRF_TRUSTED_ORIGINS # e.g. https://einfachdeutsch.vercel.app
        sync: false
      - key: FRONTEND_URL # e.g. https://einfachdeutsch.vercel.app
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Cloudinary (server-side avatar uploads). Set in the dashboard:
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Email (required for verification links in production):
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
